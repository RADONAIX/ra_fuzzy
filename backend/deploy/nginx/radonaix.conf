# RADONAIX — nginx: serves the built UI (SPA) AND proxies /api to the backend,
# so everything lives on a single HTTPS origin (no separate :8080 / :8000, no CORS).
#
#   https://10.200.36.156/         -> built UI (static files)
#   https://10.200.36.156/api/...  -> gunicorn backend
#
# Bare VM : upstream = 127.0.0.1:8000 ; deploy the UI build to /var/www/radonaix.
# Docker  : upstream = api:8000 ; mount the built dist into the nginx container
#           at /var/www/radonaix (the UI repo produces it via `npm run build`).
#
# TLS: self-signed via deploy/gen-selfsigned-cert.sh, or certbot for a real domain.

upstream radonaix_api {
    server 127.0.0.1:8000;   # Docker: change to  server api:8000;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name 10.200.36.156;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 10.200.36.156;

    ssl_certificate     /etc/nginx/certs/radonaix.crt;   # your cert
    ssl_certificate_key /etc/nginx/certs/radonaix.key;   # your key
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Where the built UI (npm run build, SPA mode -> dist/client/) is deployed.
    # TanStack Start SPA mode emits "_shell.html" as the app shell (not index.html).
    root /var/www/radonaix;
    index _shell.html;

    client_max_body_size 10m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # --- Backend API (keep the /api prefix — note: NO trailing slash on proxy_pass) ---
    location /api/ {
        proxy_pass http://radonaix_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;        # stream large report downloads
        proxy_read_timeout 300s;
    }

    # --- Export downloads (Download Center) — served directly by nginx ---
    # The API authorizes GET /api/exports/{id}/download and returns an
    # X-Accel-Redirect to this internal location; nginx then serves the .csv.gz
    # from disk with native Range/resume + sendfile. This makes multi-GB (10s of
    # GB) exports resumable and bypasses proxy_read_timeout. Must match the
    # backend EXPORT_XACCEL_LOCATION (/_export_files) and REPORTS_DIR.
    # nginx's user MUST be able to read REPORTS_DIR (perms + SELinux context).
    location /_export_files/ {
        internal;
        alias /var/lib/radonaix/reports/;   # = REPORTS_DIR (trailing slash required)
        sendfile on;
        tcp_nopush on;
        add_header Accept-Ranges bytes;
    }

    # --- Grafana (system + app monitoring) — proxied on the same origin ---
    # Grafana listens on 127.0.0.1:3000 with serve_from_sub_path=true and
    # root_url=https://<host>/grafana/ (see deploy/grafana/grafana.ini).
    # The UI "System Monitoring" screen embeds these dashboards in an iframe.
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Grafana Live (websockets)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Allow the UI (same origin) to iframe Grafana — overrides the server-level
        # X-Frame-Options DENY for this path only. add_header in a location drops
        # inherited headers, so re-declare the security headers we still want.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # --- Hashed static assets (Vite build) — cache hard ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- SPA fallback: any other path serves the app shell (client-side routing) ---
    location / {
        try_files $uri $uri/ /_shell.html;
    }
}
