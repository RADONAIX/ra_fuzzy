; RADONAIX — Grafana overrides. Merge into /etc/grafana/grafana.ini (RPM default),
; or drop in as a custom config. The admin password is set via the
; GF_SECURITY_ADMIN_PASSWORD environment variable (systemd drop-in / EnvironmentFile),
; NOT hardcoded here.

[server]
; Grafana listens on localhost only; nginx terminates TLS and proxies /grafana/.
http_addr = 127.0.0.1
http_port = 3000
; Served behind nginx at the /grafana/ sub-path on the app's HTTPS origin.
; Replace <host> with the server IP/domain (e.g. 10.200.37.142).
root_url = https://<host>/grafana/
serve_from_sub_path = true

[security]
; Allow embedding so the UI "System Monitoring" screen can iframe the dashboards.
; Served same-origin behind nginx (/grafana/), and nginx sets X-Frame-Options
; SAMEORIGIN for that path so the app can frame it.
allow_embedding = true
cookie_secure = true
; admin_user defaults to "admin"; admin_password comes from GF_SECURITY_ADMIN_PASSWORD.

[users]
; Operators log in to Grafana directly; no public sign-up.
allow_sign_up = false

[auth.anonymous]
; Read-only anonymous viewer so the embedded iframe renders without a Grafana
; login prompt. The /grafana path is reachable only through the app's HTTPS
; origin; the UI screen itself is gated by the "settings" RBAC permission.
; Editing/admin still requires a real Grafana login.
enabled = true
org_name = Main Org.
org_role = Viewer

[smtp]
; Email delivery for alert notifications (Gmail relay). The password is a Gmail
; APP PASSWORD (needs 2FA on the account) supplied via GF_SMTP_PASSWORD env in the
; systemd drop-in — NEVER hardcode it here.
enabled = true
host = smtp.gmail.com:587
user = platum07@gmail.com
from_address = platum07@gmail.com
from_name = RADONAIX Monitoring
startTLS_policy = MandatoryStartTLS

[analytics]
reporting_enabled = false
check_for_updates = false
