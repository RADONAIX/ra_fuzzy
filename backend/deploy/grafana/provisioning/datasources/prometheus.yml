# Auto-provisioned Prometheus datasource for Grafana.
# Copied to /etc/grafana/provisioning/datasources/ — Grafana loads it on start.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://127.0.0.1:9090
    isDefault: true
    editable: false
